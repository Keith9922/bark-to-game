<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ribbon Parade</title>
<style>
  html,body{margin:0;background:#f3ead4;overflow:hidden;font-family:"Caveat","Patrick Hand",cursive;touch-action:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;background:#f3ead4;cursor:crosshair}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W=0,H=0;
function fitCanvas(){
  const dpr = devicePixelRatio||1;
  W = innerWidth; H = innerHeight;
  cv.style.width = W+'px'; cv.style.height=H+'px';
  cv.width = Math.floor(W*dpr); cv.height = Math.floor(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize',fitCanvas); fitCanvas();

// Colors
const PAPER='#f3ead4';
const GRAPHITE='#2a2520';
const RUST='#a8412c';
const BLUE='#5a7a92';
const WASH='#c8b88a';
const PINK='rgba(232,90,140,0.55)';
const FED='rgba(34,58,120,0.5)';

// State
let state='title';
let last=performance.now();
let timeLeft=35;
let frameTick=0;
let boilTime=0;
let boilSeed=0;
let ribbons=[];
let saved=0;
let lost=0;
let lossReason='';

// Conductor (rooftop) - fixed position; baton aims at mouse/touch
const conductor = { x: 0, y: 0 };
const arch = { x: 0, y: 0, w: 120, h: 90 };

// Pointer
const ptr = { x: 0, y: 0, down:false, pressedThisFrame:false };
addEventListener('pointermove', e => { ptr.x=e.clientX; ptr.y=e.clientY; });
addEventListener('pointerdown', e => {
  ptr.x=e.clientX; ptr.y=e.clientY; ptr.down=true; ptr.pressedThisFrame=true;
  ensureAudio();
  if(state==='title'){ startGame(); }
  else if(state==='win'||state==='lose'){ state='title'; }
});
addEventListener('pointerup', () => { ptr.down=false; });

// Keys
const keys={};
addEventListener('keydown', e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){
    ensureAudio();
    if(state==='title') startGame();
    else if(state==='win'||state==='lose') state='title';
  }
});
addEventListener('keyup', e=>{ keys[e.key]=false; });

// Audio
let actx=null;
function ensureAudio(){
  if(!actx){
    try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  } else if(actx.state==='suspended'){ actx.resume(); }
}

function pencilScratch(dur=0.12, gain=0.08, hp=1200){
  if(!actx) return;
  const n = actx.sampleRate*dur;
  const buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++){
    const t=i/n;
    d[i] = (Math.random()*2-1) * (1-t) * (0.5 + 0.5*Math.sin(t*60));
  }
  const src = actx.createBufferSource(); src.buffer=buf;
  const g = actx.createGain(); g.gain.value=gain;
  const hpf = actx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=hp;
  src.connect(hpf).connect(g).connect(actx.destination); src.start();
}

function paperFlick(gain=0.12){
  if(!actx) return;
  const dur=0.18;
  const n = actx.sampleRate*dur;
  const buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++){
    const t=i/n;
    d[i] = (Math.random()*2-1)*Math.pow(1-t,2);
  }
  const src=actx.createBufferSource(); src.buffer=buf;
  const g=actx.createGain(); g.gain.value=gain;
  const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=0.7;
  src.connect(bp).connect(g).connect(actx.destination); src.start();
}

function softTap(){
  if(!actx) return;
  const dur=0.08;
  const n = actx.sampleRate*dur;
  const buf = actx.createBuffer(1,n,actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<n;i++){
    d[i] = (Math.random()*2-1)*Math.pow(1-i/n,3);
  }
  const src=actx.createBufferSource(); src.buffer=buf;
  const g=actx.createGain(); g.gain.value=0.18;
  const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
  src.connect(lp).connect(g).connect(actx.destination); src.start();
}

function celebration(){
  if(!actx) return;
  for(let i=0;i<6;i++){
    setTimeout(()=>{paperFlick(0.1); pencilScratch(0.08,0.05,1600);}, i*90);
  }
}

// Metronome - sparse rhythm
let metroT=0;
function metro(dt){
  metroT += dt;
  if(metroT>0.9){
    metroT=0;
    if(state==='play') pencilScratch(0.05, 0.03, 2000);
  }
}

// Game start
function startGame(){
  state='play';
  timeLeft=35;
  saved=0; lost=0;
  ribbons=[];
  setupLevel();
}

function setupLevel(){
  // Conductor on rooftop bottom-left area
  conductor.x = 80;
  conductor.y = H - 110;
  // Arch on right side
  arch.w = 110; arch.h = 130;
  arch.x = W - 160;
  arch.y = H*0.35;

  // Spawn ribbons across the sky
  const N = 7;
  ribbons=[];
  for(let i=0;i<N;i++){
    ribbons.push(makeRibbon(
      120 + Math.random()*(W*0.5),
      80 + Math.random()*(H*0.55),
      i
    ));
  }
}

function makeRibbon(x,y,seed){
  const segs=12;
  const r = { x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10,
    seed, hue: Math.random()<0.5?RUST:BLUE,
    pace: 0.6+Math.random()*0.8,
    phase: Math.random()*Math.PI*2,
    segs:[], done:false, dying:false, fadeAge:0
  };
  for(let i=0;i<segs;i++) r.segs.push({x:x-i*8, y:y});
  return r;
}

// Wobble helper (boil)
function wob(seed){
  // returns small offset that updates with boilSeed
  const s = Math.sin((seed+boilSeed)*12.9898)*43758.5453;
  return (s - Math.floor(s) - 0.5) * 2;
}

function update(dt){
  boilTime += dt;
  if(boilTime>0.33){ // ~3fps boil
    boilTime=0;
    boilSeed++;
  }
  frameTick += dt;
  metro(dt);

  if(state!=='play') return;

  timeLeft -= dt;
  if(timeLeft<=0){
    state='lose';
    lossReason='The wind forgot the melody.';
    paperFlick(0.2);
    return;
  }

  // Conductor baton direction
  let bx = ptr.x, by = ptr.y;
  // Keyboard nudging: use arrow keys to push a point near conductor
  if(keys['ArrowLeft']||keys['a']) bx = conductor.x - 200;
  if(keys['ArrowRight']||keys['d']) bx = conductor.x + 200;
  if(keys['ArrowUp']||keys['w']) by = conductor.y - 200;
  if(keys['ArrowDown']||keys['s']) by = conductor.y + 200;

  // Wind / nudge force: emanates from conductor toward pointer when pressed
  const nudgeActive = ptr.down || keys[' '] || keys['Enter'] || keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||keys['w']||keys['a']||keys['s']||keys['d'];

  // Update each ribbon
  for(const r of ribbons){
    if(r.done) continue;
    if(r.dying){ r.fadeAge += dt; continue; }

    // Gentle breeze - drift right with wobble
    r.vx += (8 + Math.sin(frameTick*0.7 + r.phase)*4) * dt;
    r.vy += Math.sin(frameTick*r.pace + r.phase)*30*dt;

    // Nudge force from conductor
    if(nudgeActive){
      const dx = bx - conductor.x, dy = by - conductor.y;
      const dlen = Math.hypot(dx,dy)+0.001;
      const ndx = dx/dlen, ndy = dy/dlen;
      // force falls off with distance from conductor line
      const toR_x = r.x - conductor.x, toR_y = r.y - conductor.y;
      const dist = Math.hypot(toR_x, toR_y);
      const cone = (toR_x*ndx + toR_y*ndy)/(dist+0.001); // cos angle
      if(dist < 500 && cone > 0.2){
        const strength = 240 * Math.max(0,cone) * (1 - dist/600);
        r.vx += ndx * strength * dt;
        r.vy += ndy * strength * dt;
      }
    }

    // Ribbon-to-ribbon avoidance (avoid knots)
    let knotPress=0;
    for(const o of ribbons){
      if(o===r||o.done||o.dying) continue;
      const dx=r.x-o.x, dy=r.y-o.y;
      const d=Math.hypot(dx,dy);
      if(d<50 && d>0.1){
        const f = (50-d)/50;
        r.vx += (dx/d)*f*80*dt;
        r.vy += (dy/d)*f*80*dt;
        knotPress += f;
      }
    }
    // If multiple ribbons too tight too long, "knot" - lose
    r.knot = (r.knot||0)*0.95 + knotPress*dt;
    if(r.knot > 6){
      state='lose';
      lossReason='A ribbon tangled into a knot.';
      paperFlick(0.25);
      return;
    }

    // Damping
    r.vx *= 0.96; r.vy *= 0.96;
    // Clamp
    r.vx = Math.max(-180, Math.min(180, r.vx));
    r.vy = Math.max(-180, Math.min(180, r.vy));

    r.x += r.vx*dt;
    r.y += r.vy*dt;

    // Trail segments follow
    let px=r.x, py=r.y;
    for(let i=0;i<r.segs.length;i++){
      const s = r.segs[i];
      const dx=px-s.x, dy=py-s.y;
      const d=Math.hypot(dx,dy);
      const target = 9;
      if(d>target){
        const f = (d-target)/d;
        s.x += dx*f;
        s.y += dy*f;
      }
      // wave
      s.y += Math.sin(frameTick*2 + i*0.6 + r.phase)*0.3;
      px=s.x; py=s.y;
    }

    // Off-screen edge check
    if(r.x < -20 || r.x > W+20 || r.y < -20 || r.y > H+20){
      state='lose';
      lossReason='A ribbon drifted off into the sky.';
      paperFlick(0.25);
      return;
    }

    // Arch passage
    if(r.x > arch.x+arch.w*0.3 && r.x < arch.x+arch.w*0.9 &&
       r.y > arch.y+10 && r.y < arch.y+arch.h-10){
      r.done = true;
      r.dying = true;
      saved++;
      softTap();
      pencilScratch(0.1, 0.07, 1400);
      if(saved>=ribbons.length){
        state='win';
        celebration();
      }
    }
  }
}

// ===== Rendering =====

// Paper grain (pre-rendered)
let grainCanvas=null;
function buildGrain(){
  grainCanvas = document.createElement('canvas');
  grainCanvas.width=256; grainCanvas.height=256;
  const g = grainCanvas.getContext('2d');
  const id = g.createImageData(256,256);
  for(let i=0;i<id.data.length;i+=4){
    const v = Math.random();
    const dark = v<0.04 ? 1 : 0;
    id.data[i]=42; id.data[i+1]=37; id.data[i+2]=32;
    id.data[i+3]= dark? 18 : (v<0.15? 8 : 0);
  }
  g.putImageData(id,0,0);
}
buildGrain();

function drawPaper(){
  ctx.fillStyle=PAPER;
  ctx.fillRect(0,0,W,H);
  // grain pattern
  const pat = ctx.createPattern(grainCanvas,'repeat');
  ctx.fillStyle=pat;
  ctx.fillRect(0,0,W,H);
  // edge vignette as cross-hatch
  ctx.strokeStyle='rgba(42,37,32,0.06)';
  ctx.lineWidth=1;
  for(let i=0;i<W;i+=14){
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i+30, H);
    ctx.stroke();
  }
}

// Wobbled line
function wline(x1,y1,x2,y2,color,width,seed){
  const wx1 = x1 + wob(seed)*1;
  const wy1 = y1 + wob(seed+1)*1;
  const wx2 = x2 + wob(seed+2)*1;
  const wy2 = y2 + wob(seed+3)*1;
  ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(wx1,wy1);
  // slight curve
  const mx=(wx1+wx2)/2 + wob(seed+4)*1.5;
  const my=(wy1+wy2)/2 + wob(seed+5)*1.5;
  ctx.quadraticCurveTo(mx,my,wx2,wy2);
  ctx.stroke();
}

// Torn-edge border
function drawBorder(){
  ctx.save();
  ctx.strokeStyle=GRAPHITE; ctx.lineWidth=2.5; ctx.lineJoin='round';
  const m=18;
  ctx.beginPath();
  let x=m, y=m;
  ctx.moveTo(x,y);
  // top
  const steps = Math.floor(W/22);
  for(let i=1;i<=steps;i++){
    x = m + i*(W-2*m)/steps + wob(100+i)*2;
    y = m + wob(200+i)*3;
    ctx.lineTo(x,y);
  }
  // right
  const sy = Math.floor(H/22);
  for(let i=1;i<=sy;i++){
    x = W - m + wob(300+i)*3;
    y = m + i*(H-2*m)/sy + wob(400+i)*2;
    ctx.lineTo(x,y);
  }
  // bottom
  for(let i=1;i<=steps;i++){
    x = (W-m) - i*(W-2*m)/steps + wob(500+i)*2;
    y = H - m + wob(600+i)*3;
    ctx.lineTo(x,y);
  }
  // left
  for(let i=1;i<=sy;i++){
    x = m + wob(700+i)*3;
    y = (H-m) - i*(H-2*m)/sy + wob(800+i)*2;
    ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function crossHatch(x,y,w,h,color,density,seed){
  ctx.save();
  ctx.strokeStyle=color; ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<density;i++){
    const sx = x + (i*7+seed*3)%w + wob(seed+i)*1;
    const sy = y + ((i*13+seed*5)%h);
    ctx.moveTo(sx,sy);
    ctx.lineTo(sx+6+wob(seed+i+1)*1, sy+6+wob(seed+i+2)*1);
  }
  ctx.stroke();
  ctx.restore();
}

function drawConductor(){
  const x=conductor.x, y=conductor.y;
  // rooftop (line)
  ctx.save();
  wline(x-70, y+40, x+80, y+30, GRAPHITE, 2.5, 10);
  // roof hatching
  crossHatch(x-60, y+40, 130, 30, GRAPHITE+'aa', 14, 11);
  // body
  ctx.strokeStyle=GRAPHITE; ctx.lineWidth=2.5; ctx.lineCap='round';
  // head
  ctx.beginPath();
  ctx.arc(x+wob(20), y-30+wob(21), 9, 0, Math.PI*2);
  ctx.stroke();
  // body line
  wline(x, y-21, x+wob(22)*0.5, y+10, GRAPHITE, 2.5, 22);
  // legs
  wline(x, y+10, x-8, y+38, GRAPHITE,2.5, 23);
  wline(x, y+10, x+8, y+38, GRAPHITE,2.5, 24);
  // baton arm pointing toward pointer
  let bx=ptr.x, by=ptr.y;
  if(keys['ArrowLeft']||keys['a']) bx=x-200;
  if(keys['ArrowRight']||keys['d']) bx=x+200;
  if(keys['ArrowUp']||keys['w']) by=y-200;
  if(keys['ArrowDown']||keys['s']) by=y+200;
  const dx=bx-x, dy=by-(y-10);
  const dl=Math.hypot(dx,dy)+0.001;
  const ax = x + dx/dl*22, ay = (y-10) + dy/dl*22;
  wline(x, y-10, ax, ay, GRAPHITE, 2.5, 25);
  // baton (rust red)
  const bxEnd = ax + dx/dl*26, byEnd = ay + dy/dl*26;
  wline(ax, ay, bxEnd, byEnd, RUST, 2.5, 26);
  // tip dot
  ctx.fillStyle=RUST;
  ctx.beginPath(); ctx.arc(bxEnd,byEnd,2.5,0,Math.PI*2); ctx.fill();

  // little hat
  wline(x-9, y-37, x+9, y-37, GRAPHITE, 2.5, 27);
  wline(x-6, y-37, x-6, y-44, GRAPHITE, 2.5, 28);
  wline(x+6, y-37, x+6, y-44, GRAPHITE, 2.5, 29);
  wline(x-6, y-44, x+6, y-44, GRAPHITE, 2.5, 30);
  ctx.restore();
}

function drawArch(){
  const x=arch.x, y=arch.y, w=arch.w, h=arch.h;
  ctx.save();
  // arch outline
  ctx.strokeStyle=GRAPHITE; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(x+wob(40), y+h+wob(41));
  ctx.lineTo(x+wob(42), y+h*0.4+wob(43));
  ctx.quadraticCurveTo(x+w/2+wob(44)*2, y-10+wob(45)*2, x+w+wob(46), y+h*0.4+wob(47));
  ctx.lineTo(x+w+wob(48), y+h+wob(49));
  ctx.stroke();

  // inner double line
  ctx.strokeStyle=RUST; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(x+8+wob(50), y+h+wob(51));
  ctx.lineTo(x+8+wob(52), y+h*0.45+wob(53));
  ctx.quadraticCurveTo(x+w/2+wob(54), y+0+wob(55), x+w-8+wob(56), y+h*0.45+wob(57));
  ctx.lineTo(x+w-8+wob(58), y+h+wob(59));
  ctx.stroke();

  // hatching on columns
  crossHatch(x, y+h*0.4, 14, h*0.6, GRAPHITE+'88', 16, 60);
  crossHatch(x+w-14, y+h*0.4, 14, h*0.6, GRAPHITE+'88', 16, 61);

  // "HOME" label
  ctx.fillStyle=GRAPHITE;
  ctx.font='28px "Caveat","Patrick Hand",cursive';
  ctx.textAlign='center';
  ctx.fillText('home', x+w/2 + wob(62), y+h*0.25 + wob(63));

  // bunting flags
  for(let i=0;i<5;i++){
    const fx = x + 10 + i*((w-20)/4);
    const fy = y + h*0.45 + Math.sin(frameTick*2+i)*2;
    ctx.fillStyle = i%2? PINK : FED;
    ctx.beginPath();
    ctx.moveTo(fx-5, fy);
    ctx.lineTo(fx+5, fy);
    ctx.lineTo(fx, fy+8);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawRibbon(r){
  if(r.done && r.fadeAge>0.7) return;
  ctx.save();
  const alpha = r.dying ? Math.max(0, 1 - r.fadeAge/0.7) : 1;
  ctx.globalAlpha=alpha;

  // Main graphite stroke through segments
  ctx.strokeStyle=GRAPHITE; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  const pts = [{x:r.x,y:r.y}, ...r.segs];
  ctx.moveTo(pts[0].x+wob(r.seed*7), pts[0].y+wob(r.seed*7+1));
  for(let i=1;i<pts.length-1;i++){
    const xc=(pts[i].x+pts[i+1].x)/2 + wob(r.seed*7+i)*1;
    const yc=(pts[i].y+pts[i+1].y)/2 + wob(r.seed*7+i+10)*1;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
  }
  ctx.stroke();

  // color highlight stroke offset (riso registration mismatch)
  ctx.strokeStyle = r.hue==RUST? PINK : FED;
  ctx.lineWidth = 4;
  ctx.beginPath();
  const ox = 2.5 + wob(r.seed*7+100)*1.2;
  const oy = -1.5 + wob(r.seed*7+101)*1.2;
  ctx.moveTo(pts[0].x+ox, pts[0].y+oy);
  for(let i=1;i<pts.length-1;i++){
    const xc=(pts[i].x+pts[i+1].x)/2+ox;
    const yc=(pts[i].y+pts[i+1].y)/2+oy;
    ctx.quadraticCurveTo(pts[i].x+ox, pts[i].y+oy, xc, yc);
  }
  ctx.stroke();

  // rust hatching highlights along the ribbon
  ctx.strokeStyle = r.hue==RUST? 'rgba(168,65,44,0.6)' : 'rgba(90,122,146,0.5)';
  ctx.lineWidth=1.5;
  for(let i=0;i<pts.length-1;i+=2){
    const p=pts[i];
    ctx.beginPath();
    ctx.moveTo(p.x+wob(r.seed+i)*1, p.y-3+wob(r.seed+i+1)*1);
    ctx.lineTo(p.x+4+wob(r.seed+i+2)*1, p.y+1+wob(r.seed+i+3)*1);
    ctx.stroke();
  }

  // head dot
  const h = pts[0];
  ctx.fillStyle=GRAPHITE;
  ctx.beginPath();
  ctx.arc(h.x+wob(r.seed*9), h.y+wob(r.seed*9+1), 3.5, 0, Math.PI*2);
  ctx.fill();

  // knot warning shimmer
  if(!r.dying && r.knot>2){
    ctx.strokeStyle=RUST;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.arc(h.x, h.y, 14+Math.sin(frameTick*8)*2, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();

  // confetti on done
  if(r.done){
    for(let i=0;i<8;i++){
      const a = i/8*Math.PI*2;
      const rad = 10 + r.fadeAge*60;
      const cx = arch.x+arch.w/2 + Math.cos(a)*rad;
      const cy = arch.y+arch.h*0.5 + Math.sin(a)*rad;
      ctx.fillStyle = i%2? PINK : FED;
      ctx.globalAlpha = Math.max(0, 1-r.fadeAge/0.7);
      ctx.beginPath();
      ctx.arc(cx,cy,2.5,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawHUD(){
  ctx.save();
  ctx.fillStyle=GRAPHITE;
  ctx.font='32px "Caveat","Patrick Hand",cursive';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText(`ribbons home: ${saved}/${ribbons.length}`, 30+wob(900), 28+wob(901));

  // Timer
  ctx.textAlign='right';
  const t = Math.max(0,timeLeft).toFixed(1);
  ctx.fillStyle = timeLeft<10? RUST : GRAPHITE;
  ctx.fillText(`time: ${t}s`, W-30+wob(902), 28+wob(903));

  // riso registration shadow of HUD
  ctx.fillStyle=PINK;
  ctx.textAlign='left';
  ctx.fillText(`ribbons home: ${saved}/${ribbons.length}`, 32+wob(910), 30+wob(911));
  ctx.textAlign='right';
  ctx.fillStyle=FED;
  ctx.fillText(`time: ${t}s`, W-32+wob(912), 30+wob(913));
  ctx.restore();
}

function drawTitle(){
  ctx.save();
  ctx.textAlign='center';
  ctx.fillStyle=GRAPHITE;
  ctx.font='84px "Caveat","Patrick Hand",cursive';
  const cx=W/2, cy=H/2-60;
  // shadow registers
  ctx.fillStyle=PINK;
  ctx.fillText('Ribbon Parade', cx+4+wob(1), cy+3+wob(2));
  ctx.fillStyle=FED;
  ctx.fillText('Ribbon Parade', cx-3+wob(3), cy-2+wob(4));
  ctx.fillStyle=GRAPHITE;
  ctx.fillText('Ribbon Parade', cx+wob(5), cy+wob(6));

  ctx.font='28px "Caveat","Patrick Hand",cursive';
  ctx.fillStyle=GRAPHITE;
  ctx.fillText('coax the sky-ribbons home before the wind forgets', cx, cy+70);
  ctx.fillText('hold / click in the sky to nudge with your baton', cx, cy+105);
  ctx.fillText('keys: arrows or WASD also steer the breeze', cx, cy+140);

  ctx.fillStyle=RUST;
  ctx.font='36px "Caveat","Patrick Hand",cursive';
  ctx.fillText('— tap or press Enter to begin —', cx, cy+200);

  // little decoration: a ribbon doodle
  ctx.strokeStyle=GRAPHITE; ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<60;i++){
    const x = W/2 - 200 + i*7;
    const y = cy + 250 + Math.sin(i*0.4+frameTick)*8;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x+wob(i)*0.5,y+wob(i+1)*0.5);
  }
  ctx.stroke();
  ctx.restore();
}

function drawEnd(){
  ctx.save();
  ctx.textAlign='center';
  const cx=W/2, cy=H/2-40;
  if(state==='win'){
    ctx.fillStyle=PINK;
    ctx.font='80px "Caveat","Patrick Hand",cursive';
    ctx.fillText('Parade complete!', cx+3, cy+3);
    ctx.fillStyle=GRAPHITE;
    ctx.fillText('Parade complete!', cx, cy);
    ctx.font='32px "Caveat","Patrick Hand",cursive';
    ctx.fillStyle=GRAPHITE;
    ctx.fillText(`all ${ribbons.length} ribbons threaded home`, cx, cy+70);
    ctx.fillStyle=RUST;
    ctx.fillText('tap / Enter for another round', cx, cy+120);
    // confetti
    for(let i=0;i<60;i++){
      const x=(i*53 + boilSeed*7)%W;
      const y=(i*37 + boilSeed*11)%H;
      ctx.fillStyle=i%2?PINK:FED;
      ctx.fillRect(x,y,3,3);
    }
  } else {
    ctx.fillStyle=FED;
    ctx.font='72px "Caveat","Patrick Hand",cursive';
    ctx.fillText('Parade scattered…', cx+3, cy+3);
    ctx.fillStyle=GRAPHITE;
    ctx.fillText('Parade scattered…', cx, cy);
    ctx.font='28px "Caveat","Patrick Hand",cursive';
    ctx.fillStyle=RUST;
    ctx.fillText(lossReason, cx, cy+70);
    ctx.fillStyle=GRAPHITE;
    ctx.fillText(`ribbons home: ${saved}/${ribbons.length}`, cx, cy+110);
    ctx.fillStyle=RUST;
    ctx.fillText('tap / Enter to try again', cx, cy+160);
  }
  ctx.restore();
}

// little wind hint lines
function drawWindHints(){
  let bx=ptr.x, by=ptr.y;
  if(keys['ArrowLeft']||keys['a']) bx=conductor.x-200;
  if(keys['ArrowRight']||keys['d']) bx=conductor.x+200;
  if(keys['ArrowUp']||keys['w']) by=conductor.y-200;
  if(keys['ArrowDown']||keys['s']) by=conductor.y+200;
  const active = ptr.down || keys[' ']||keys['Enter']||keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']||keys['w']||keys['a']||keys['s']||keys['d'];
  if(!active) return;
  const dx=bx-conductor.x, dy=by-(conductor.y-10);
  const dl=Math.hypot(dx,dy)+0.001;
  const ndx=dx/dl, ndy=dy/dl;
  ctx.save();
  ctx.strokeStyle='rgba(90,122,146,0.5)';
  ctx.lineWidth=1.5;
  for(let i=0;i<8;i++){
    const t = ((frameTick*120 + i*40) % 320);
    const sx = conductor.x + ndx*t + (-ndy)*((i-4)*8);
    const sy = (conductor.y-10) + ndy*t + (ndx)*((i-4)*8);
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.lineTo(sx+ndx*16+wob(i)*1, sy+ndy*16+wob(i+1)*1);
    ctx.stroke();
  }
  ctx.restore();
}

function render(){
  drawPaper();
  drawBorder();
  if(state==='title'){
    drawTitle();
  } else {
    drawArch();
    drawWindHints();
    for(const r of ribbons) drawRibbon(r);
    drawConductor();
    drawHUD();
    if(state==='win'||state==='lose') drawEnd();
  }
}

function frame(now){
  const dt = Math.min(0.04,(now-last)/1000);
  last=now;
  update(dt);
  render();
  ptr.pressedThisFrame=false;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
