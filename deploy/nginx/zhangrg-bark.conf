# bark-to-game @ bark2game.zhangrg.top
# Static React SPA (frontend-dist) + FastAPI backend on 127.0.0.1:8000.
# HTTP-only here; certbot --nginx adds the :443 server block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name bark2game.zhangrg.top;
    server_tokens off;

    root /opt/bark-to-game/frontend-dist;
    index index.html;

    # Backend API. Long timeouts cover slow Opus generations (90-180 s) + SSE.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE + slow LLM responses: no buffering, wide read window.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_set_header Connection "";
        client_max_body_size 12m;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback for the 30-line client router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
