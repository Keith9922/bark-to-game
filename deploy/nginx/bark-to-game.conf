server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/www/bark-to-game;
    index index.html;

    # Cache busting friendly: short cache for the entry, longer for game payloads.
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location /games/ {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    # Fallback for any other static asset.
    location / {
        try_files $uri $uri/ =404;
    }

    # Hide nginx version + minimal compression.
    server_tokens off;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
