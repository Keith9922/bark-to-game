# Full-stack nginx site for the demo host:
#   /                   -> /opt/bark-to-game/frontend-dist (SPA, index.html fallback)
#   /api/*              -> http://127.0.0.1:8000 (FastAPI backend)
#   /api/game/job/*/stream  -> same backend, SSE (long-lived, no buffering)
#
# Listens on **9000** internally. Public HTTPS access is via cloudflared
# tunnel (see deploy/systemd/bark-to-cloudflared.service) — the tunnel
# terminates TLS for us and forwards plaintext to 127.0.0.1:9000.
#
# Why not :80? On this demo host port 80 is shared with other projects;
# also, browsers refuse navigator.mediaDevices.getUserMedia over plain
# http:// from non-localhost, so a no-TLS public endpoint would silently
# break the recorder. The cloudflared tunnel gives us https://*.trycloudflare.com
# (or your named tunnel) which the browser treats as a secure context.

server {
    listen 9000 default_server;
    listen [::]:9000 default_server;
    server_name _;

    server_tokens off;

    # Frontend SPA — built by `npm run build` in frontend/, rsynced to here.
    root /opt/bark-to-game/frontend-dist;
    index index.html;

    # Backend API. Long timeouts to cover slow Opus generations (90-180 s).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE + slow LLM responses: turn off the response buffer and bump
        # the per-request read window so a 2-3 min generation doesn't trip
        # the default 60 s upstream timeout.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # Empty Connection header lets the upstream HTTP/1.1 stay open for SSE.
        proxy_set_header Connection "";
        # Audio upload — 10 MB matches the backend's MAX_BYTES.
        client_max_body_size 12m;
    }

    # Backend health (root path, not under /api/).
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback: any unknown path serves the built index.html so client-side
    # routes (if any) still work. Real 404s for static assets are unaffected.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache built assets with content hashes for a year. index.html stays
    # no-cache so a deploy is visible on next request.
    location ~* \.(js|css|png|jpg|svg|woff2?|ttf|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;
}
