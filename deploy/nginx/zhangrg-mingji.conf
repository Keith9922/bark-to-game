# mingji (Next.js, pm2) @ mingji.zhangrg.top
# pm2 process serves on 127.0.0.1:3000; nginx fronts it.
# default_server so bare-IP access keeps reaching mingji as it did before.
# HTTP-only here; certbot --nginx adds the :443 server block + redirect.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name mingji.zhangrg.top;
    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
